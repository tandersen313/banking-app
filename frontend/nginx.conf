server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # This is the key setting for React Router:
    # If a file isn't found, serve index.html instead of a 404.
    # React then reads the URL and shows the right page.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
